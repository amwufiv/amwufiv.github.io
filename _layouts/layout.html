<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset="UTF-8"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css"></noscript>
    <link rel="stylesheet" href="/css/main.css" />
    <meta name='viewport' content='width=device-width, initial-scale=1' />
    <link rel="icon" type="image/png" href="/assets/icon/icon.png"/>
    {% if site.google_analytics and jekyll.environment == 'production' %}
    {% include analytics.html %}
    {% endif %}
    <!-- todo -->
</head>
<body>
    <div id="container">
        <div id="content">
            <header id="header">
                <h1>
                    <a href="/">UFIV</a>
                </h1>
            </header>
            <section>
                {{ content }}
            </section>
        </div>
    </div>
    <div id="footer">
        <div class="social">
            <a href="https://twitter.com/{{ site.data.social.twitter }}" target="_blank" rel="noopener noreferrer"">
                <i class="bi bi-twitter"></i>
            </a>
            <a href="mailto:{{ site.data.social.mail }}" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-envelope-fill"></i>
            </a>
            <a href="https://github.com/{{ site.data.social.github }}" target="_blank" rel="noopener noreferrer">
                <i class="bi bi-github"></i>
            </a>
        </div>
        
        <!-- <div class="copyright">
            <span> Copyright © {{ site.time | date: "%Y" }} ufiv </span>
        </div> -->
        
    </div>
</body>
</html>
